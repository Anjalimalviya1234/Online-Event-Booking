version: '3.8'

services:
  backend:
    build: ./backend
    container_name: event-booking-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - event-booking-network

  frontend:
    build: ./frontend
    container_name: event-booking-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - event-booking-network

networks:
  event-booking-network:
    driver: bridge
